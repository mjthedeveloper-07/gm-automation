[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "HUGGINGFACE_API_KEY,GROQ_API_KEY,INSTAGRAM_ACCOUNT_ID,META_ACCESS_TOKEN,VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL,SUPABASE_ANON_KEY,SUPABASE_URL"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  functions = "netlify/functions"
  autoLaunch = false

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/mcp-servers/**"]

# ── Cron Jobs ──────────────────────────────────────────────────────────────────
[functions."cron-queue-runner"]
  schedule = "*/5 * * * *"

[functions."cron-trend-fetch"]
  schedule = "0 6 * * *"

[functions."cron-analytics-sync"]
  schedule = "0 * * * *"

[functions."cron-daily-report"]
  schedule = "0 9 * * *"

[functions."cron-weekly-analysis"]
  schedule = "0 8 * * 1"

[functions."cron-token-refresh"]
  schedule = "0 */6 * * *"

# ── API Redirects ──────────────────────────────────────────────────────────────
[[redirects]]
  from = "/api/generate-post"
  to = "/.netlify/functions/generate-post"
  status = 200

[[redirects]]
  from = "/api/generate-caption"
  to = "/.netlify/functions/generate-caption"
